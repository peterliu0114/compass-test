<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>v1.7.0 五天實測追蹤 — weather-app</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; min-height: 100vh;
      background: #1a2030; color: #e8edf5;
      font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      padding: 24px 16px 60px;
    }
    .wrap { max-width: 460px; margin: 0 auto; }
    h1 { font-size: 19px; margin: 0 0 4px; }
    .sub { font-size: 13px; color: #9aa7bd; margin: 0 0 20px; }
    .progress {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 16px; margin-bottom: 20px;
      text-align: center;
    }
    .progress .big { font-size: 40px; font-weight: 800; }
    .progress .big .total { font-size: 22px; color: #9aa7bd; }
    .progress .label { font-size: 13px; color: #9aa7bd; margin-top: 2px; }
    .streak-dots { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }
    .dot {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      background: rgba(255,255,255,0.08); color: #6b7689;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .dot.done { background: #2e7d52; color: #fff; border-color: #3da06a; }
    .verdict {
      margin-top: 14px; font-size: 14px; font-weight: 700;
      padding: 10px; border-radius: 10px;
    }
    .verdict.go { background: rgba(46,125,82,0.25); color: #7be0a8; }
    .verdict.wait { background: rgba(255,255,255,0.05); color: #9aa7bd; }
    .day {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 14px 16px; margin-bottom: 14px;
    }
    .day.checked { border-color: #3da06a; background: rgba(46,125,82,0.1); }
    .day-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .day-title { font-size: 15px; font-weight: 700; }
    .day-date { font-size: 12px; color: #9aa7bd; }
    .checks { display: flex; flex-direction: column; gap: 8px; }
    .check {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 13px; line-height: 1.5; cursor: pointer;
      color: #c8d2e4;
    }
    .check input { margin-top: 2px; width: 17px; height: 17px; flex-shrink: 0; accent-color: #3da06a; }
    .note {
      width: 100%; margin-top: 10px;
      background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; color: #e8edf5; font-size: 13px;
      padding: 8px 10px; resize: vertical; min-height: 44px;
      font-family: inherit;
    }
    .note::placeholder { color: #6b7689; }
    .day-state { font-size: 12px; font-weight: 700; }
    .day-state.ok { color: #7be0a8; }
    .day-state.no { color: #9aa7bd; }
    .footer { font-size: 12px; color: #6b7689; line-height: 1.7; margin-top: 20px; }
    .reset {
      margin-top: 16px; width: 100%; padding: 11px;
      background: rgba(255,90,90,0.12); color: #ff8a8a;
      border: 1px solid rgba(255,90,90,0.3); border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🧪 v1.7.0 五天實測追蹤</h1>
    <p class="sub">標準：連續 5 天打開地圖都覺得自然 → 進 v1.7.0 正式 release</p>

    <div class="progress">
      <div class="big"><span id="doneCount">0</span><span class="total"> / 5 天</span></div>
      <div class="label">已完成的實測天數</div>
      <div class="streak-dots" id="dots"></div>
      <div class="verdict wait" id="verdict">尚未達標 — 繼續觀察</div>
    </div>

    <div id="days"></div>

    <button class="reset" id="resetBtn">🗑 清除全部進度（重新開始）</button>

    <div class="footer">
      <p><strong>每日勾選項目（依 PLAN_v1_7_0 實測重點）：</strong>每天打開地圖看一次，逐項確認感受。一天全部勾完才算「該天達標」。</p>
      <p><strong>注意：</strong>進度存在這支瀏覽器本機（localStorage）。請固定用同一台裝置/瀏覽器開此頁，換裝置或清快取進度會消失。</p>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'v170_field_test_v1';

    const CHECK_ITEMS = [
      '今天打開地圖了',
      '命中地標的氣場詞自然（不太命理、不太空洞）',
      'emoji 圖示在我的設備顯示正常',
      '指南針旋轉流暢、不延遲',
      'POI 小卡好按、不擋路'
    ];

    const DAY_COUNT = 5;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch { return {}; }
    }
    function saveState(s) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
    }

    let state = loadState();

    function dayIsDone(d) {
      const day = state[d];
      if (!day || !day.checks) return false;
      return day.checks.length === CHECK_ITEMS.length && day.checks.every(Boolean);
    }

    function todayStr() {
      const t = new Date();
      const mm = String(t.getMonth() + 1).padStart(2, '0');
      const dd = String(t.getDate()).padStart(2, '0');
      return `${t.getFullYear()}-${mm}-${dd}`;
    }

    function render() {
      let doneTotal = 0;
      for (let d = 1; d <= DAY_COUNT; d++) if (dayIsDone(d)) doneTotal++;
      document.getElementById('doneCount').textContent = doneTotal;

      const dotsEl = document.getElementById('dots');
      dotsEl.innerHTML = '';
      for (let d = 1; d <= DAY_COUNT; d++) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (dayIsDone(d) ? ' done' : '');
        dot.textContent = dayIsDone(d) ? '✓' : d;
        dotsEl.appendChild(dot);
      }

      const verdict = document.getElementById('verdict');
      if (doneTotal >= DAY_COUNT) {
        verdict.className = 'verdict go';
        verdict.textContent = '✅ 五天達標！可進 v1.7.0 正式 release';
      } else {
        verdict.className = 'verdict wait';
        verdict.textContent = `尚未達標 — 還差 ${DAY_COUNT - doneTotal} 天`;
      }

      const daysEl = document.getElementById('days');
      daysEl.innerHTML = '';
      for (let d = 1; d <= DAY_COUNT; d++) {
        const day = state[d] || { checks: [], note: '', date: '' };
        const done = dayIsDone(d);

        const card = document.createElement('div');
        card.className = 'day' + (done ? ' checked' : '');

        const head = document.createElement('div');
        head.className = 'day-head';
        head.innerHTML = `
          <div>
            <span class="day-title">Day ${d}</span>
            ${day.date ? `<span class="day-date"> · ${day.date}</span>` : ''}
          </div>
          <span class="day-state ${done ? 'ok' : 'no'}">${done ? '達標 ✓' : '未完成'}</span>
        `;
        card.appendChild(head);

        const checks = document.createElement('div');
        checks.className = 'checks';
        CHECK_ITEMS.forEach((item, i) => {
          const label = document.createElement('label');
          label.className = 'check';
          const input = document.createElement('input');
          input.type = 'checkbox';
          input.checked = !!(day.checks && day.checks[i]);
          input.addEventListener('change', () => {
            if (!state[d]) state[d] = { checks: [], note: '', date: '' };
            if (!state[d].checks) state[d].checks = [];
            state[d].checks[i] = input.checked;
            if (input.checked && !state[d].date) state[d].date = todayStr();
            saveState(state);
            render();
          });
          const span = document.createElement('span');
          span.textContent = item;
          label.appendChild(input);
          label.appendChild(span);
          checks.appendChild(label);
        });
        card.appendChild(checks);

        const note = document.createElement('textarea');
        note.className = 'note';
        note.placeholder = '今天的感受 / 想記的 patch 候選…（選填）';
        note.value = day.note || '';
        note.addEventListener('input', () => {
          if (!state[d]) state[d] = { checks: [], note: '', date: '' };
          state[d].note = note.value;
          saveState(state);
        });
        card.appendChild(note);

        daysEl.appendChild(card);
      }
    }

    document.getElementById('resetBtn').addEventListener('click', () => {
      if (confirm('確定清除全部 5 天進度？此動作無法復原。')) {
        state = {};
        saveState(state);
        render();
      }
    });

    render();
  </script>
</body>
</html>
